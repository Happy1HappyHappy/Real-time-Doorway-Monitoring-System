# Authors: Claire Liu, Yu-Jing Wei
# Description: Spring Boot configuration for Kafka consumers, PostgreSQL datasource,
# Qdrant vector database, and Kafka topic names used by the Door-bell backend.
spring.application.name=Door-bell-backend

# ── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=doorbell-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ── PostgreSQL ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:doorbell}
spring.datasource.username=${POSTGRES_USER:doorbell}
spring.datasource.password=${POSTGRES_PASSWORD:doorbell123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Qdrant ─────────────────────────────────────────────────────────────────
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
qdrant.collection-name=person-embeddings
qdrant.similarity-threshold=0.75

# ── Topic names ────────────────────────────────────────────────────────────
app.kafka.topic.detections=doorbell-detections
app.kafka.topic.analysis-results=doorbell-analysis-results
app.kafka.topic.dlq=doorbell-dlq
