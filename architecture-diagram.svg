<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">End-to-End System Architecture</text>

  <!-- ========== EDGE LAYER (left) ========== -->
  <rect x="20" y="55" width="200" height="540" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="120" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">Edge Layer</text>

  <!-- Camera 1 -->
  <rect x="40" y="95" width="160" height="50" rx="6" fill="#DBEAFE" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="120" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">Camera 1</text>
  <text x="120" y="132" text-anchor="middle" font-size="9" fill="#3B82F6">RTSP Stream</text>

  <!-- Camera 2 -->
  <rect x="40" y="155" width="160" height="50" rx="6" fill="#DBEAFE" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="120" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">Camera 2</text>
  <text x="120" y="192" text-anchor="middle" font-size="9" fill="#3B82F6">RTSP Stream</text>

  <!-- Camera 3 -->
  <rect x="40" y="215" width="160" height="50" rx="6" fill="#DBEAFE" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="120" y="236" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">Camera 3</text>
  <text x="120" y="252" text-anchor="middle" font-size="9" fill="#3B82F6">RTSP Stream</text>

  <!-- ========== MEDIA SERVER ========== -->
  <rect x="240" y="55" width="160" height="540" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="320" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Streaming</text>

  <rect x="255" y="140" width="130" height="80" rx="6" fill="#DCFCE7" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="320" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532D">MediaMTX</text>
  <text x="320" y="182" text-anchor="middle" font-size="9" fill="#166534">RTSP Server</text>
  <text x="320" y="196" text-anchor="middle" font-size="9" fill="#166534">WebRTC (WHEP)</text>

  <!-- Arrows: Cameras to MediaMTX -->
  <line x1="200" y1="120" x2="250" y2="160" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="200" y1="180" x2="250" y2="178" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="200" y1="240" x2="250" y2="198" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="218" y="145" font-size="8" fill="#2563EB" font-weight="bold">RTSP</text>

  <!-- ========== CV ENGINE (center) ========== -->
  <rect x="420" y="55" width="240" height="540" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="540" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A3412">Computer Vision Engine</text>

  <!-- YOLO Detection -->
  <rect x="440" y="95" width="200" height="55" rx="6" fill="#FFEDD5" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="540" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">YOLOv8 Detection</text>
  <text x="540" y="132" text-anchor="middle" font-size="9" fill="#C2410C">Person Detection (cls=0)</text>

  <!-- BoTSORT Tracking -->
  <rect x="440" y="165" width="200" height="55" rx="6" fill="#FFEDD5" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="540" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">BoTSORT Tracker</text>
  <text x="540" y="202" text-anchor="middle" font-size="9" fill="#C2410C">Multi-Object Tracking</text>

  <!-- OSNet ReID -->
  <rect x="440" y="235" width="200" height="55" rx="6" fill="#FFEDD5" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="540" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">OSNet Re-ID</text>
  <text x="540" y="272" text-anchor="middle" font-size="9" fill="#C2410C">512-dim Embedding Extraction</text>

  <!-- FFmpeg output -->
  <rect x="440" y="305" width="200" height="45" rx="6" fill="#FEF3C7" stroke="#FCD34D" filter="url(#shadow)"/>
  <text x="540" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">FFmpeg Encoder</text>
  <text x="540" y="339" text-anchor="middle" font-size="9" fill="#B45309">Annotated H.264 Stream</text>

  <!-- Arrows within CV Engine -->
  <line x1="540" y1="150" x2="540" y2="162" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="540" y1="220" x2="540" y2="232" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="540" y1="290" x2="540" y2="302" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Arrow: MediaMTX to YOLO -->
  <line x1="385" y1="165" x2="435" y2="120" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="398" y="132" font-size="8" fill="#16A34A" font-weight="bold">RTSP Pull</text>

  <!-- Arrow: FFmpeg back to MediaMTX -->
  <path d="M 440 330 L 395 330 L 395 210 L 385 210" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="5,3"/>
  <text x="392" y="275" font-size="8" fill="#16A34A" font-weight="bold" transform="rotate(-90,392,275)">Annotated</text>

  <!-- ========== MESSAGE BROKER ========== -->
  <rect x="420" y="370" width="240" height="90" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="540" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">Message Broker</text>

  <rect x="440" y="403" width="200" height="45" rx="6" fill="#EDE9FE" stroke="#C4B5FD" filter="url(#shadow)"/>
  <text x="540" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Apache Kafka</text>
  <text x="540" y="438" text-anchor="middle" font-size="9" fill="#7C3AED">Topic: doorbell-detections</text>

  <!-- Arrow: OSNet to Kafka -->
  <line x1="540" y1="350" x2="540" y2="368" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="362" font-size="8" fill="#5B21B6" font-weight="bold">JSON Events</text>

  <!-- ========== BACKEND ========== -->
  <rect x="700" y="55" width="180" height="540" rx="8" fill="#FDF2F8" stroke="#FBCFE8" stroke-width="1.5"/>
  <text x="790" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#9D174D">Backend Service</text>

  <rect x="715" y="95" width="150" height="70" rx="6" fill="#FCE7F3" stroke="#F9A8D4" filter="url(#shadow)"/>
  <text x="790" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#9D174D">Spring Boot</text>
  <text x="790" y="134" text-anchor="middle" font-size="9" fill="#BE185D">Kafka Consumer</text>
  <text x="790" y="148" text-anchor="middle" font-size="9" fill="#BE185D">REST API + WebSocket</text>

  <!-- Detection Service -->
  <rect x="715" y="180" width="150" height="55" rx="6" fill="#FCE7F3" stroke="#F9A8D4" filter="url(#shadow)"/>
  <text x="790" y="201" text-anchor="middle" font-size="11" font-weight="bold" fill="#9D174D">Detection Service</text>
  <text x="790" y="217" text-anchor="middle" font-size="9" fill="#BE185D">Person Matching Logic</text>

  <!-- Arrow: Kafka to Backend -->
  <line x1="660" y1="425" x2="760" y2="425" stroke="#333" stroke-width="1.5"/>
  <line x1="760" y1="425" x2="760" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="418" font-size="8" fill="#5B21B6" font-weight="bold">Consume</text>

  <!-- Arrow within backend -->
  <line x1="790" y1="165" x2="790" y2="177" stroke="#9D174D" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== DATA LAYER ========== -->
  <rect x="700" y="260" width="180" height="180" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="790" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C4A6E">Data Layer</text>

  <!-- PostgreSQL -->
  <rect x="715" y="295" width="150" height="50" rx="6" fill="#E0F2FE" stroke="#7DD3FC" filter="url(#shadow)"/>
  <text x="790" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C4A6E">PostgreSQL</text>
  <text x="790" y="332" text-anchor="middle" font-size="9" fill="#0369A1">Persons + Detections</text>

  <!-- Qdrant -->
  <rect x="715" y="355" width="150" height="50" rx="6" fill="#E0F2FE" stroke="#7DD3FC" filter="url(#shadow)"/>
  <text x="790" y="376" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C4A6E">Qdrant</text>
  <text x="790" y="392" text-anchor="middle" font-size="9" fill="#0369A1">512-dim Vector Search</text>

  <!-- Arrows: Backend to DB -->
  <line x1="790" y1="235" x2="790" y2="292" stroke="#0C4A6E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== FRONTEND ========== -->
  <rect x="900" y="55" width="180" height="540" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="990" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Frontend</text>

  <rect x="915" y="95" width="150" height="60" rx="6" fill="#D1FAE5" stroke="#6EE7B7" filter="url(#shadow)"/>
  <text x="990" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">React 19 + Vite</text>
  <text x="990" y="134" text-anchor="middle" font-size="9" fill="#047857">Live Camera Dashboard</text>

  <!-- WebRTC Feed -->
  <rect x="915" y="170" width="150" height="50" rx="6" fill="#D1FAE5" stroke="#6EE7B7" filter="url(#shadow)"/>
  <text x="990" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">WebRTC Player</text>
  <text x="990" y="207" text-anchor="middle" font-size="9" fill="#047857">WHEP Protocol</text>

  <!-- Detection Panel -->
  <rect x="915" y="235" width="150" height="50" rx="6" fill="#D1FAE5" stroke="#6EE7B7" filter="url(#shadow)"/>
  <text x="990" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Detection Panel</text>
  <text x="990" y="272" text-anchor="middle" font-size="9" fill="#047857">Live Alerts + History</text>

  <!-- Arrow: MediaMTX to Frontend (WebRTC) -->
  <path d="M 320 220 L 320 530 L 990 530 L 990 290" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="580" y="518" width="110" height="18" rx="3" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="635" y="531" text-anchor="middle" font-size="9" fill="#16A34A" font-weight="bold">WebRTC Stream</text>

  <!-- Arrow: Backend to Frontend (WebSocket) -->
  <line x1="865" y1="130" x2="912" y2="130" stroke="#9D174D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="888" y="122" font-size="8" fill="#9D174D" font-weight="bold">WS</text>

  <!-- ========== LEGEND ========== -->
  <rect x="30" y="490" width="180" height="95" rx="6" fill="white" stroke="#CBD5E1" stroke-width="1"/>
  <text x="120" y="508" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Legend</text>
  <line x1="45" y1="520" x2="85" y2="520" stroke="#2563EB" stroke-width="2"/>
  <text x="95" y="524" font-size="9" fill="#334155">RTSP Video</text>
  <line x1="45" y1="538" x2="85" y2="538" stroke="#16A34A" stroke-width="2"/>
  <text x="95" y="542" font-size="9" fill="#334155">WebRTC / Annotated</text>
  <line x1="45" y1="556" x2="85" y2="556" stroke="#5B21B6" stroke-width="2"/>
  <text x="95" y="560" font-size="9" fill="#334155">Kafka Events</text>
  <line x1="45" y1="574" x2="85" y2="574" stroke="#9D174D" stroke-width="2"/>
  <text x="95" y="578" font-size="9" fill="#334155">WebSocket</text>

  <!-- Tech labels at bottom -->
  <rect x="30" y="308" width="180" height="168" rx="6" fill="white" stroke="#CBD5E1" stroke-width="1"/>
  <text x="120" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Tech Stack</text>
  <text x="45" y="346" font-size="9" fill="#64748B">CV: YOLOv8, BoTSORT, OSNet</text>
  <text x="45" y="362" font-size="9" fill="#64748B">Stream: RTSP, WebRTC, FFmpeg</text>
  <text x="45" y="378" font-size="9" fill="#64748B">Broker: Apache Kafka (KRaft)</text>
  <text x="45" y="394" font-size="9" fill="#64748B">Backend: Spring Boot 4</text>
  <text x="45" y="410" font-size="9" fill="#64748B">DB: PostgreSQL 16</text>
  <text x="45" y="426" font-size="9" fill="#64748B">Vector: Qdrant (Cosine)</text>
  <text x="45" y="442" font-size="9" fill="#64748B">Frontend: React 19 + Vite</text>
  <text x="45" y="458" font-size="9" fill="#64748B">Infra: Docker Compose</text>

</svg>