services:

  # ── Message Broker ───────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${AWS_PUBLIC_HOST}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Media Server ─────────────────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
    environment:
      MTX_PROTOCOLS: tcp
      MTX_WEBRTCADDRESS: ":8889"
      MTX_WEBRTCICEHOSTS: "${WEBRTC_ICE_HOST:-127.0.0.1}"
      MTX_WEBRTCADDITIONALHOSTS: "${WEBRTC_ICE_HOST:-127.0.0.1}"
      MTX_WEBRTCICEUDPMUXADDRESS: ":8189"

  # ── YOLO Inference Workers ───────────────────────────────────────────────
  yolo-worker-1:
    build:
      context: ./Door-bell-backend/Python-engine
      args:
        CUDA_BASE: ${YOLO_BASE_IMAGE:-python:3.11-slim}
    container_name: yolo-worker-1
    env_file: .env
    environment:
      RTSP_INPUT: rtsp://mediamtx:8554/cam-01
      RTSP_OUTPUT: rtsp://mediamtx:8554/cam-01/annotated
      CAMERA_ID: cam-01
    depends_on: [kafka, mediamtx]

  yolo-worker-2:
    build: ./Door-bell-backend/Python-engine
    container_name: yolo-worker-2
    env_file: .env
    environment:
      RTSP_INPUT: rtsp://mediamtx:8554/cam-02
      RTSP_OUTPUT: rtsp://mediamtx:8554/cam-02/annotated
      CAMERA_ID: cam-02
    depends_on: [kafka, mediamtx]

  # ── VLM Worker (Ollama client) ───────────────────────────────────────────
  vlm-worker:
    build: ./Door-bell-backend/VLM-worker
    container_name: vlm-worker
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5vl:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [kafka]

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./Door-bell-frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on: [java-backend, mediamtx]

  # ── Java Backend ─────────────────────────────────────────────────────────
  java-backend:
    build: ./Door-bell-backend/Java-backend
    container_name: java-backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
    ports:
      - "${JAVA_SERVER_PORT}:8080"
    depends_on: [kafka, postgres, qdrant]

  # ── Databases ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
